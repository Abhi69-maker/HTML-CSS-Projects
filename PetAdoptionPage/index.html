<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pet Adoption</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <header>
    <h2 class="logo">adoptme.com</h2>
    <h1>Adopt a Pet Today 🐾</h1>
  </header>

  <section class="container">

    <!-- CARD 1 -->
    <div class="card">
      <img src="dop.png" alt="Dog">
      <h3>Meet Jerry</h3>
      <p>Jerry is a charming and friendly dog looking for a loving home. He brings joy and unconditional love.</p>
      <button>Adopt Now</button>
    </div>

    <!-- CARD 2 -->
    <div class="card">
      <img src="cat.png" alt="Cat">
      <h3>Meet Tom</h3>
      <p>Tom is an affectionate cat who loves companionship and will brighten your home every day.</p>
      <button>Adopt Now</button>
    </div>

  </section>

</body>
</html>
